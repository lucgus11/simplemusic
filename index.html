<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimpleMusic</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="/style.css">
    <meta name="theme-color" content="#1db954">
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
</head>
<body>
    <header>
        <h1>🎵 SimpleMusic</h1>
        <button id="share-btn" class="icon-btn">Partager l'app</button>
    </header>

    <main>
        <section class="card">
            <h2>Métronome</h2>
            <div class="metronome-controls">
                <span id="bpm-display">120 BPM</span>
                <input type="range" id="bpm-slider" min="40" max="220" value="120">
                
                <div class="measure-controls">
                    <label for="measure-select">Mesure :</label>
                    <select id="measure-select">
                        <option value="4">4/4</option>
                        <option value="3">3/4</option>
                        <option value="2">2/4</option>
                        <option value="5">5/4</option>
                    </select>
                </div>

                <button id="play-btn">Play</button>
            </div>
        </section>

        <section class="card">
            <h2>Clavier MIDI</h2>
            <div id="midi-status">En attente d'un appareil MIDI...</div>
            <div id="midi-log" style="font-size: 2rem; text-align: center; margin-top: 10px;">--</div>
        </section>

        <section class="card">
            <h2>🎙️ Dictaphone / Idées</h2>
            <div class="recorder-controls">
                <button id="record-btn" class="record-idle">🔴 Enregistrer</button>
                <button id="stop-btn" disabled>⏹️ Stopper</button>
            </div>
            
            <div id="audio-playback-container" style="display: none; margin-top: 15px;">
                <h3>Dernier enregistrement :</h3>
                <audio id="audio-playback" controls style="width: 100%;"></audio>
                
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <a id="download-link" download="SimpleMusic_Record.webm">
                        <button style="background: #333;">💾 Brut (.webm)</button>
                    </a>
                    <button id="convert-mp3-btn" style="background: #e91e63;">⚙️ Convertir en MP3</button>
                </div>
                <div id="ffmpeg-status" style="margin-top: 10px; font-size: 0.9em; color: #aaa;"></div>
            </div>
        </section>
    </main>

    <script src="/app.js"></script>
</body>
</html>
